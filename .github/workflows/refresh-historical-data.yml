name: Refresh Historical Storm Data

on:
  schedule:
    # December 1st at 02:00 UTC — after the Philippine typhoon season
    # winds down. SigwaPH pulls from the Western Pacific basin CSV
    # (the source for all PH typhoons) and filters to PAR coordinates.
    # IBTrACS finalizes provisional tracks via annual reanalysis, so
    # once-a-year refresh is the right cadence for historical data.
    - cron: "0 2 1 12 *"
  # Manual trigger for first run, ad-hoc refreshes, or testing.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  refresh:
    name: Preprocess IBTrACS Data
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run preprocess script
        run: bun run scripts/preprocess-ibtracs.ts

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet data/historical-storms.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updated data
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/historical-storms.json
          git commit -m "chore: refresh IBTrACS historical storm data [skip ci]"
          git push origin develop
