name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Filter paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '!(**.md|.gitignore|.gitattributes|.lintstagedrc.json|.zed/**)'

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: changes
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        if: needs.changes.outputs.code == 'true'
        uses: actions/checkout@v7

      - name: Dependency Review
        if: needs.changes.outputs.code == 'true'
        uses: actions/dependency-review-action@v5.0.0
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: always
          allow-licenses: MIT, Apache-2.0, ISC, BSD-2-Clause, BSD-3-Clause
          warn-only: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: changes
    steps:
      - name: Checkout
        if: needs.changes.outputs.code == 'true'
        uses: actions/checkout@v7

      - name: Setup Biome
        if: needs.changes.outputs.code == 'true'
        uses: biomejs/setup-biome@v2
        with:
          version: 2.2.0

      - name: Run Biome CI
        if: needs.changes.outputs.code == 'true'
        run: biome ci

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: changes
    steps:
      - name: Checkout
        if: needs.changes.outputs.code == 'true'
        uses: actions/checkout@v7

      - name: Setup Bun
        if: needs.changes.outputs.code == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
          cache: true

      - name: Install dependencies
        if: needs.changes.outputs.code == 'true'
        run: bun install --frozen-lockfile

      - name: Run typecheck
        if: needs.changes.outputs.code == 'true'
        run: bun typecheck

